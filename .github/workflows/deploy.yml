name: Deploy VPS

on:
  release:
    types:
      - published

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Sync code with main
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/kado-to
            git fetch origin main && git reset --hard FETCH_HEAD

      - name: Start services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/kado-to
            docker compose -f docker-compose.prod.yaml up -d --build

      - name: Wait for app healthcheck
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            for i in $(seq 1 10); do
              status=$(docker inspect --format='{{json .State.Health.Status}}' kado-api 2>/dev/null | tr -d '"')
              [ "$status" = "healthy" ] && exit 0
              [ $i -eq 10 ] && echo "Container não ficou healthy a tempo" && exit 1
              sleep 5
            done

      - name: Run migrations
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/kado-to
            docker compose -f docker-compose.prod.yaml exec -T app php artisan migrate --force